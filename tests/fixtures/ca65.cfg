# Minimal cc65 (ca65/ld65) linker config fixture — SNES LoROM shape.
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw;
    RAM:  start = $0200, size = $1E00, type = rw;
    ROM:  start = $8000, size = $8000, type = ro, file = %O, fill = yes;
}
SEGMENTS {
    main:   load = ROM, type = ro;
    assets: load = ROM, type = ro;
    DATA:   load = ROM, run = RAM, type = rw;
    BSS:    load = RAM, type = bss, define = yes;
}
